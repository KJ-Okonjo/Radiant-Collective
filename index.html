<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/images/logos/radiantlogoicongold.png">

<body>
    <!-- HEADER (STICKY NAVIGATION) -->
    <header class="site-header">
        <div class="header-inner">
