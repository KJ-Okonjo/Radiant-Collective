<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">

<body class="bg-base">

                <div style="display: flex; gap: var(--space-4); justify-content: center; margin-top: var(--space-3); flex-wrap: wrap;">
                    <a href="about.html" style="color: var(--color-accent); text-decoration: underline;">About Us</a>
                    <a href="contact.html" style="color: var(--color-accent); text-decoration: underline;">Contact</a>

            </div>
