<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Radiant Collective Capital</title>
    <meta name="description" content="Log in to your Radiant Collective Capital account">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">
    <!-- Minimal Header -->
    <header class="auth-header">
        <div class="header-container">
            <a href="index.html" class="logo">Radiant Collective</a>
        </div>
    </header>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card fade-in-up">
                <h1>Log In</h1>
                <p class="auth-subtitle">Welcome back</p>

                <!-- LinkedIn SSO -->
                <a href="https://client.memberstack.com/auth-provider/login?provider=linkedin&appId=app_cmesp1uyv009y0wtmdi8lfp22&origin=www.radiantcollective.capital&allowSignup=true" class="btn btn-linkedin">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.5236 0H1.47639C0.660764 0 0 0.645833 0 1.44271V18.5573C0 19.3542 0.660764 20 1.47639 20H18.5236C19.3392 20 20 19.3542 20 18.5573V1.44271C20 0.645833 19.3392 0 18.5236 0ZM5.93229 17.0312H2.96563V7.48958H5.93229V17.0312ZM4.44896 6.19792C3.49479 6.19792 2.72396 5.42708 2.72396 4.47292C2.72396 3.51875 3.49479 2.74792 4.44896 2.74792C5.40313 2.74792 6.17396 3.51875 6.17396 4.47292C6.17396 5.42708 5.40313 6.19792 4.44896 6.19792ZM17.0365 17.0312H14.0698V12.4115C14.0698 11.2969 14.0490 9.86979 12.5240 9.86979C10.9781 9.86979 10.7490 11.0781 10.7490 12.3333V17.0312H7.78229V7.48958H10.6302V8.80208H10.6719C11.0781 8.02604 12.0469 7.20833 13.4844 7.20833C16.4896 7.20833 17.0365 9.19271 17.0365 11.7708V17.0312Z" fill="white"/>
                    </svg>
                    Continue with LinkedIn
                </a>

                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Login Form -->
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember">
                            <span>Keep me logged in</span>
                        </label>
                        <a href="#" class="link-small">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                </form>

                <p class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
